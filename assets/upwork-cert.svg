<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" role="img" aria-label="Upwork Skill Certification — User Experience Design">
  <!-- scalloped medal edge -->
  <circle cx="110" cy="110" r="101" fill="none" stroke="#e2e6e8" stroke-width="16"
          stroke-dasharray="0.1 20.9" stroke-linecap="round"/>
  <!-- navy medal body -->
  <circle cx="110" cy="110" r="95" fill="#13343f"/>
  <circle cx="110" cy="110" r="88" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- green skill icon disc -->
  <circle cx="110" cy="78" r="30" fill="#6fda44"/>
  <!-- white certificate/clipboard -->
  <rect x="97" y="63" width="26" height="30" rx="4" fill="#ffffff"/>
  <rect x="104" y="60" width="12" height="6" rx="2" fill="#ffffff"/>
  <rect x="101" y="71" width="18" height="2.6" rx="1.3" fill="#c7d3ce"/>
  <rect x="101" y="77" width="14" height="2.6" rx="1.3" fill="#c7d3ce"/>
  <!-- green check -->
  <path d="M103 85.5 l4.5 4.5 l9.5 -11" fill="none" stroke="#2fa300"
        stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- text -->
  <text x="110" y="134" text-anchor="middle" fill="#ffffff"
        font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">Upwork Skill</text>
  <text x="110" y="154" text-anchor="middle" fill="#ffffff"
        font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">Certification</text>
  <text x="110" y="176" text-anchor="middle" fill="#6fda44"
        font-family="Arial, Helvetica, sans-serif" font-size="10.5" font-weight="600">User Experience Design</text>
</svg>
